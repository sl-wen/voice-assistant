<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>语音助手 - Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      margin-top: 40px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 14px;
      color: #888;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      margin-bottom: 30px;
      width: 100%;
      max-width: 360px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    .status-dot.connected { background: #4ade80; box-shadow: 0 0 8px #4ade8066; }
    .status-dot.recording { background: #f87171; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text { font-size: 14px; }

    /* 波形动画 */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 60px;
      margin-bottom: 30px;
    }

    .waveform .bar {
      width: 4px;
      height: 8px;
      background: #6366f1;
      border-radius: 2px;
      transition: height 0.1s;
    }

    .waveform.active .bar {
      animation: wave 0.6s ease-in-out infinite;
    }

    @keyframes wave {
      0%, 100% { height: 8px; background: #6366f1; }
      50% { height: 40px; background: #818cf8; }
    }

    /* 主按钮 */
    .mic-btn {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 48px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.3);
      margin-bottom: 20px;
    }

    .mic-btn:active {
      transform: scale(0.95);
    }

    .mic-btn.recording {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 8px 30px rgba(239, 68, 68, 0.4);
    }

    .mic-btn:disabled {
      background: #333;
      box-shadow: none;
      cursor: not-allowed;
    }

    .label {
      font-size: 14px;
      color: #888;
      margin-bottom: 30px;
    }

    /* 喇叭控制 */
    .speaker-section {
      width: 100%;
      max-width: 360px;
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
    }

    .speaker-section h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 12px;
    }

    .speaker-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-switch {
      width: 50px;
      height: 28px;
      background: #333;
      border-radius: 14px;
      position: relative;
      cursor: pointer;
      transition: background 0.3s;
    }

    .toggle-switch.active {
      background: #6366f1;
    }

    .toggle-switch::after {
      content: '';
      width: 22px;
      height: 22px;
      background: white;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 3px;
      transition: left 0.3s;
    }

    .toggle-switch.active::after {
      left: 25px;
    }

    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .volume-row span { font-size: 18px; }

    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #6366f1;
      border-radius: 50%;
      cursor: pointer;
    }

    /* 连接失败提示 */
    .error-msg {
      color: #f87171;
      font-size: 13px;
      text-align: center;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🎙️ 语音助手</h1>
    <p>手机变 PC 麦克风 & 喇叭</p>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">连接中...</span>
  </div>

  <!-- 波形 -->
  <div class="waveform" id="waveform">
    <div class="bar" style="animation-delay: 0s"></div>
    <div class="bar" style="animation-delay: 0.1s"></div>
    <div class="bar" style="animation-delay: 0.2s"></div>
    <div class="bar" style="animation-delay: 0.3s"></div>
    <div class="bar" style="animation-delay: 0.4s"></div>
    <div class="bar" style="animation-delay: 0.5s"></div>
    <div class="bar" style="animation-delay: 0.3s"></div>
    <div class="bar" style="animation-delay: 0.2s"></div>
    <div class="bar" style="animation-delay: 0.1s"></div>
    <div class="bar" style="animation-delay: 0s"></div>
  </div>

  <!-- 麦克风按钮 -->
  <button class="mic-btn" id="micBtn" disabled>🎤</button>
  <div class="label" id="micLabel">点击开始麦克风</div>

  <!-- 喇叭 -->
  <div class="speaker-section">
    <h3>🔊 喇叭输出</h3>
    <div class="speaker-toggle">
      <span>接收 PC 音频</span>
      <div class="toggle-switch" id="speakerToggle"></div>
    </div>
    <div class="volume-row">
      <span>🔈</span>
      <input type="range" id="volumeSlider" min="0" max="100" value="80">
      <span>🔊</span>
    </div>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <script>
    // ========== WebSocket 连接 ==========
    const wsUrl = `ws://${location.host}`;
    let ws = null;
    let isConnected = false;

    // DOM
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const micBtn = document.getElementById('micBtn');
    const micLabel = document.getElementById('micLabel');
    const waveform = document.getElementById('waveform');
    const speakerToggle = document.getElementById('speakerToggle');
    const volumeSlider = document.getElementById('volumeSlider');
    const errorMsg = document.getElementById('errorMsg');

    // ========== 音频 ==========
    let audioContext = null;
    let mediaStream = null;
    let scriptProcessor = null;
    let isRecording = false;
    let speakerEnabled = false;
    let nextPlayTime = 0;
    let gainNode = null;

    function connect() {
      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        isConnected = true;
        statusDot.classList.add('connected');
        statusText.textContent = '已连接';
        micBtn.disabled = false;
        errorMsg.style.display = 'none';
      };

      ws.onclose = () => {
        isConnected = false;
        statusDot.classList.remove('connected');
        statusText.textContent = '连接断开';
        micBtn.disabled = true;
        stopMic();
        // 自动重连
        setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        errorMsg.textContent = '❌ 连接失败，请确认 PC 端服务正在运行';
        errorMsg.style.display = 'block';
      };

      ws.onmessage = (event) => {
        if (typeof event.data === 'string') {
          // 文本消息
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'connected') {
              console.log('Server:', msg.message);
            }
          } catch (e) {}
        } else {
          // 二进制音频数据 → 播放
          if (speakerEnabled) {
            playAudio(event.data);
          }
        }
      };
    }

    // ========== 麦克风 ==========
    async function startMic() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            sampleRate: 48000,
            channelCount: 1,
            echoCancellation: true,
            noiseSuppression: true,
          }
        });

        audioContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: 48000,
        });

        const source = audioContext.createMediaStreamSource(mediaStream);

        // 使用 ScriptProcessor 采集原始 PCM
        scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
        source.connect(scriptProcessor);
        scriptProcessor.connect(audioContext.destination);

        scriptProcessor.onaudioprocess = (e) => {
          if (!isRecording || !isConnected) return;
          const float32 = e.inputBuffer.getChannelData(0);
          // 转为 Int16 PCM 发送（更高效）
          const int16 = float32ToInt16(float32);
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(int16.buffer);
          }
        };

        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.textContent = '⏹️';
        micLabel.textContent = '录音中... 点击停止';
        statusDot.classList.add('recording');
        waveform.classList.add('active');

      } catch (err) {
        errorMsg.textContent = '❌ 无法访问麦克风: ' + err.message;
        errorMsg.style.display = 'block';
      }
    }

    function stopMic() {
      isRecording = false;

      if (scriptProcessor) {
        scriptProcessor.disconnect();
        scriptProcessor = null;
      }
      if (mediaStream) {
        mediaStream.getTracks().forEach(t => t.stop());
        mediaStream = null;
      }
      if (audioContext && audioContext.state !== 'closed') {
        audioContext.close();
        audioContext = null;
      }

      micBtn.classList.remove('recording');
      micBtn.textContent = '🎤';
      micLabel.textContent = '点击开始麦克风';
      statusDot.classList.remove('recording');
      waveform.classList.remove('active');
    }

    // Float32 → Int16 PCM
    function float32ToInt16(float32Array) {
      const int16 = new Int16Array(float32Array.length);
      for (let i = 0; i < float32Array.length; i++) {
        const s = Math.max(-1, Math.min(1, float32Array[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      return int16;
    }

    // ========== 喇叭播放 ==========
    let playContext = null;

    function playAudio(arrayBuffer) {
      if (!playContext) {
        playContext = new (window.AudioContext || window.webkitAudioContext)({
          sampleRate: 48000,
        });
        gainNode = playContext.createGain();
        gainNode.connect(playContext.destination);
        gainNode.gain.value = volumeSlider.value / 100;
      }

      // Int16 PCM → Float32
      const int16 = new Int16Array(arrayBuffer);
      const float32 = new Float32Array(int16.length);
      for (let i = 0; i < int16.length; i++) {
        float32[i] = int16[i] / 0x8000;
      }

      const audioBuffer = playContext.createBuffer(1, float32.length, 48000);
      audioBuffer.copyToChannel(float32, 0);

      const source = playContext.createBufferSource();
      source.buffer = audioBuffer;
      source.connect(gainNode);

      // 调度播放，避免间隙
      const now = playContext.currentTime;
      if (nextPlayTime < now) {
        nextPlayTime = now;
      }
      source.start(nextPlayTime);
      nextPlayTime += audioBuffer.duration;
    }

    // ========== 事件绑定 ==========
    micBtn.addEventListener('click', () => {
      if (isRecording) {
        stopMic();
      } else {
        startMic();
      }
    });

    speakerToggle.addEventListener('click', () => {
      speakerEnabled = !speakerEnabled;
      speakerToggle.classList.toggle('active', speakerEnabled);
    });

    volumeSlider.addEventListener('input', () => {
      if (gainNode) {
        gainNode.gain.value = volumeSlider.value / 100;
      }
    });

    // ========== 启动 ==========
    connect();
  </script>
</body>
</html>
