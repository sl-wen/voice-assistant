<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SoundBridge - 手机变无线麦克风 &amp; 无线音箱</title>
  <meta name="theme-color" content="#0a0a1a">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow-x:hidden;}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Helvetica Neue','Segoe UI',Roboto,sans-serif;
      background:#0a0a1a;color:#e2e8f0;
      display:flex;flex-direction:column;align-items:center;
      padding:0 20px 40px;min-height:100vh;
      -webkit-tap-highlight-color:transparent;
      -webkit-font-smoothing:antialiased;
    }

    /* ===== Brand Header ===== */
    .brand{width:100%;max-width:400px;text-align:center;padding:40px 0 24px;}
    .logo{
      display:inline-flex;align-items:center;justify-content:center;
      width:64px;height:64px;border-radius:18px;
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
      box-shadow:0 8px 32px rgba(79,70,229,0.35);
      margin-bottom:14px;position:relative;overflow:hidden;
    }
    .logo::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,transparent 60%);
    }
    .logo-inner{
      display:flex;align-items:flex-end;justify-content:center;gap:2px;
      height:30px;position:relative;z-index:1;
    }
    .logo-inner i{
      display:block;width:3px;border-radius:2px;background:rgba(255,255,255,0.9);
      animation:logoWave 1.2s ease-in-out infinite;
    }
    .logo-inner i:nth-child(1){height:8px;animation-delay:0s;}
    .logo-inner i:nth-child(2){height:16px;animation-delay:0.1s;}
    .logo-inner i:nth-child(3){height:24px;animation-delay:0.2s;}
    .logo-inner i:nth-child(4){height:30px;animation-delay:0.3s;}
    .logo-inner i:nth-child(5){height:20px;animation-delay:0.4s;}
    .logo-inner i:nth-child(6){height:12px;animation-delay:0.5s;}
    .logo-inner i:nth-child(7){height:22px;animation-delay:0.6s;}
    @keyframes logoWave{
      0%,100%{transform:scaleY(0.4);}
      50%{transform:scaleY(1);}
    }
    .brand h1{
      font-size:28px;font-weight:800;letter-spacing:-0.5px;
      background:linear-gradient(135deg,#a5b4fc,#c4b5fd,#67e8f9);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .brand .slogan{font-size:13px;color:#64748b;margin-top:4px;letter-spacing:0.5px;}

    /* ===== Connection Status Card ===== */
    .conn-card{
      width:100%;max-width:400px;
      background:linear-gradient(135deg,rgba(79,70,229,0.12),rgba(124,58,237,0.08));
      border:1px solid rgba(79,70,229,0.2);border-radius:16px;
      padding:14px 20px;margin-bottom:20px;
      display:flex;align-items:center;gap:12px;
    }
    .dot{
      width:12px;height:12px;border-radius:50%;
      background:#475569;flex-shrink:0;transition:all 0.4s;
    }
    .dot.ok{background:#4ade80;box-shadow:0 0 12px rgba(74,222,128,0.5);}
    .dot.rec{background:#f87171;box-shadow:0 0 12px rgba(248,113,113,0.5);animation:pulse 1s infinite;}
    .dot.blue{background:#60a5fa;box-shadow:0 0 12px rgba(96,165,250,0.5);animation:pulse 1.5s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
    .conn-info{display:flex;flex-direction:column;gap:2px;flex:1;}
    .stxt{font-size:14px;font-weight:600;color:#e2e8f0;}
    .conn-sub{font-size:11px;color:#64748b;}

    /* ===== Card Base (shared for mic & speaker) ===== */
    .card{
      width:100%;max-width:400px;
      border-radius:20px;
      padding:24px 20px 28px;
      display:flex;flex-direction:column;align-items:center;
      margin-bottom:16px;
      position:relative;
      overflow:hidden;
    }
    .card::before{
      content:'';position:absolute;inset:0;border-radius:20px;
      opacity:0;transition:opacity 0.4s;
      pointer-events:none;
    }

    /* ===== Mic Card (紫红色系) ===== */
    .mic-card{
      background:linear-gradient(145deg,rgba(79,70,229,0.10),rgba(124,58,237,0.06));
      border:1px solid rgba(124,58,237,0.15);
    }
    .mic-card.active{
      background:linear-gradient(145deg,rgba(239,68,68,0.10),rgba(220,38,38,0.06));
      border-color:rgba(239,68,68,0.25);
    }
    .mic-card.active::before{
      background:radial-gradient(ellipse at 50% 80%,rgba(239,68,68,0.08) 0%,transparent 70%);
      opacity:1;
    }

    /* ===== Speaker Card (青蓝色系) ===== */
    .spk-card{
      background:linear-gradient(145deg,rgba(6,182,212,0.10),rgba(8,145,178,0.06));
      border:1px solid rgba(6,182,212,0.15);
    }
    .spk-card.active{
      background:linear-gradient(145deg,rgba(6,182,212,0.14),rgba(59,130,246,0.08));
      border-color:rgba(6,182,212,0.30);
    }
    .spk-card.active::before{
      background:radial-gradient(ellipse at 50% 80%,rgba(6,182,212,0.08) 0%,transparent 70%);
      opacity:1;
    }

    /* Card title */
    .card-title{
      font-size:15px;font-weight:700;
      display:flex;align-items:center;gap:8px;
      margin-bottom:18px;letter-spacing:0.3px;
    }
    .mic-card .card-title{color:#c4b5fd;}
    .mic-card.active .card-title{color:#fca5a5;}
    .spk-card .card-title{color:#67e8f9;}
    .spk-card.active .card-title{color:#7dd3fc;}
    .card-title .card-icon{font-size:20px;}

    /* Waveform (shared) */
    .wave{
      display:flex;align-items:center;justify-content:center;
      gap:3px;height:44px;margin-bottom:20px;
    }
    .wave .bar{
      width:4px;height:8px;border-radius:2px;
      transition:background 0.3s;
    }
    /* Mic wave: purple → red when active */
    .mic-card .wave .bar{background:rgba(124,58,237,0.3);}
    .mic-card.active .wave .bar{animation:wMic 0.6s ease-in-out infinite;}
    @keyframes wMic{
      0%,100%{height:8px;background:#ef4444;}
      50%{height:36px;background:#f87171;}
    }
    /* Speaker wave: cyan */
    .spk-card .wave .bar{background:rgba(6,182,212,0.3);}
    .spk-card.active .wave .bar{animation:wSpk 0.6s ease-in-out infinite;}
    @keyframes wSpk{
      0%,100%{height:8px;background:#06b6d4;}
      50%{height:36px;background:#67e8f9;}
    }

    /* ===== Big Round Button (shared) ===== */
    .big-btn{
      width:110px;height:110px;border-radius:50%;border:none;
      color:#fff;font-size:44px;cursor:pointer;
      transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
      position:relative;overflow:hidden;
      -webkit-user-select:none;user-select:none;
      display:flex;align-items:center;justify-content:center;
    }
    .big-btn::before{
      content:'';position:absolute;inset:0;border-radius:50%;
      background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 60%);
      pointer-events:none;
    }
    .big-btn:active{transform:scale(0.92);}

    /* Mic button states */
    .mic-btn{
      background:linear-gradient(135deg,#4f46e5,#7c3aed);
      box-shadow:0 8px 40px rgba(79,70,229,0.35);
    }
    .mic-btn.rec{
      background:linear-gradient(135deg,#ef4444,#dc2626);
      box-shadow:0 8px 40px rgba(239,68,68,0.45);
      animation:recGlow 2s ease-in-out infinite;
    }
    @keyframes recGlow{
      0%,100%{box-shadow:0 8px 40px rgba(239,68,68,0.45);}
      50%{box-shadow:0 8px 60px rgba(239,68,68,0.65);}
    }
    .mic-btn:disabled{
      background:linear-gradient(135deg,#1e293b,#334155);
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
      cursor:not-allowed;opacity:0.5;
    }
    .mic-btn:disabled::before{display:none;}
    .mic-btn:disabled:active{transform:none;}

    /* Speaker button states */
    .spk-btn{
      background:linear-gradient(135deg,#0891b2,#0e7490);
      box-shadow:0 8px 40px rgba(6,182,212,0.35);
    }
    .spk-btn.on{
      background:linear-gradient(135deg,#06b6d4,#0284c7);
      box-shadow:0 8px 40px rgba(6,182,212,0.50);
      animation:spkGlow 2s ease-in-out infinite;
    }
    @keyframes spkGlow{
      0%,100%{box-shadow:0 8px 40px rgba(6,182,212,0.50);}
      50%{box-shadow:0 8px 60px rgba(6,182,212,0.70);}
    }
    .spk-btn:disabled{
      background:linear-gradient(135deg,#1e293b,#334155);
      box-shadow:0 4px 16px rgba(0,0,0,0.3);
      cursor:not-allowed;opacity:0.5;
    }
    .spk-btn:disabled::before{display:none;}
    .spk-btn:disabled:active{transform:none;}

    /* Button label */
    .btn-label{
      font-size:13px;color:#94a3b8;margin-top:12px;
      font-weight:500;transition:color 0.3s;
    }

    /* Card sub-info */
    .card-info{
      width:100%;margin-top:18px;
      display:flex;flex-direction:column;gap:10px;
    }
    .info-row{
      display:flex;align-items:center;justify-content:space-between;
    }
    .info-row .label{font-size:13px;color:#94a3b8;display:flex;align-items:center;gap:6px;}
    .info-row .val{font-size:13px;font-variant-numeric:tabular-nums;}
    .mic-card .info-row .val{color:#a78bfa;}
    .mic-card.active .info-row .val{color:#f87171;}
    .spk-card .info-row .val{color:#22d3ee;}

    /* Volume slider inside speaker card */
    .vol-row{
      display:flex;align-items:center;gap:10px;
    }
    .vol-row .vol-icon{font-size:16px;color:#64748b;}
    .vol-row .vol-icon.loud{color:#06b6d4;}
    input[type=range]{
      flex:1;-webkit-appearance:none;appearance:none;
      height:6px;background:#1e293b;border-radius:3px;outline:none;
    }
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:24px;height:24px;
      background:linear-gradient(135deg,#06b6d4,#0891b2);
      border-radius:50%;cursor:pointer;
      box-shadow:0 2px 8px rgba(6,182,212,0.4);
    }
    input[type=range]::-moz-range-thumb{
      width:24px;height:24px;
      background:linear-gradient(135deg,#06b6d4,#0891b2);
      border-radius:50%;cursor:pointer;border:none;
    }

    /* ===== Error & Debug ===== */
    .err{
      color:#f87171;font-size:13px;text-align:center;
      margin-top:16px;padding:10px 16px;
      background:rgba(248,113,113,0.1);border-radius:10px;
      display:none;width:100%;max-width:400px;
    }
    .dbg{color:#475569;font-size:11px;margin-top:10px;text-align:center;min-height:16px;}

    /* ===== Footer ===== */
    .footer{
      margin-top:auto;padding-top:24px;
      font-size:11px;color:#334155;text-align:center;
    }
    .footer .ver{color:#475569;}

    /* ===== Safe Area (notch devices) ===== */
    @supports(padding:env(safe-area-inset-top)){
      body{padding-top:env(safe-area-inset-top);}
      .brand{padding-top:max(40px,env(safe-area-inset-top));}
    }
  </style>
</head>
<body>

  <!-- Brand Header -->
  <div class="brand">
    <div class="logo">
      <div class="logo-inner">
        <i></i><i></i><i></i><i></i><i></i><i></i><i></i>
      </div>
    </div>
    <h1>SoundBridge</h1>
    <div class="slogan">手机变无线麦克风 &amp; 无线音箱</div>
  </div>

  <!-- Connection Status Card -->
  <div class="conn-card">
    <div class="dot" id="dot"></div>
    <div class="conn-info">
      <span class="stxt" id="stxt">连接中...</span>
      <span class="conn-sub">📊 等待服务器响应</span>
    </div>
  </div>

  <!-- ===== Mic Card ===== -->
  <div class="card mic-card" id="micCard">
    <div class="card-title">
      <span class="card-icon">🎙️</span> 麦克风 → 收音到 PC
    </div>
    <!-- Mic waveform -->
    <div class="wave" id="micWave">
      <div class="bar" style="animation-delay:0s"></div>
      <div class="bar" style="animation-delay:.08s"></div>
      <div class="bar" style="animation-delay:.16s"></div>
      <div class="bar" style="animation-delay:.24s"></div>
      <div class="bar" style="animation-delay:.32s"></div>
      <div class="bar" style="animation-delay:.4s"></div>
      <div class="bar" style="animation-delay:.32s"></div>
      <div class="bar" style="animation-delay:.24s"></div>
      <div class="bar" style="animation-delay:.16s"></div>
    </div>
    <!-- Mic big button -->
    <button class="big-btn mic-btn" id="micBtn" disabled>🎙️</button>
    <div class="btn-label" id="micLbl">点击开始收音</div>
    <!-- Mic sub-info -->
    <div class="card-info">
      <div class="info-row">
        <span class="label">📤 已发送</span>
        <span class="val" id="statMic">0 B</span>
      </div>
    </div>
  </div>

  <!-- ===== Speaker Card ===== -->
  <div class="card spk-card" id="spkCard">
    <div class="card-title">
      <span class="card-icon">🔊</span> 音箱 ← 播放 PC 声音
    </div>
    <!-- Speaker waveform -->
    <div class="wave" id="spkWave">
      <div class="bar" style="animation-delay:0s"></div>
      <div class="bar" style="animation-delay:.08s"></div>
      <div class="bar" style="animation-delay:.16s"></div>
      <div class="bar" style="animation-delay:.24s"></div>
      <div class="bar" style="animation-delay:.32s"></div>
      <div class="bar" style="animation-delay:.4s"></div>
      <div class="bar" style="animation-delay:.32s"></div>
      <div class="bar" style="animation-delay:.24s"></div>
      <div class="bar" style="animation-delay:.16s"></div>
    </div>
    <!-- Speaker big button (hidden toggle reused underneath) -->
    <button class="big-btn spk-btn" id="spkBtn">🔊</button>
    <div class="btn-label" id="spkLbl">点击开始播放</div>
    <!-- Speaker sub-info -->
    <div class="card-info">
      <div class="vol-row">
        <span class="vol-icon">🔈</span>
        <input type="range" id="spkVol" min="0" max="100" value="80">
        <span class="vol-icon loud">🔊</span>
      </div>
      <div class="info-row">
        <span class="label">📥 已接收</span>
        <span class="val" id="statSpk">0 B</span>
      </div>
    </div>
    <!-- Hidden toggle for JS compatibility -->
    <div class="toggle" id="spkToggle" style="display:none"></div>
  </div>

  <div class="err" id="err"></div>
  <div class="dbg" id="dbg" style="min-height:20px;padding:8px;color:#94a3b8;font-size:12px;">初始化中...</div>

  <!-- Footer -->
  <div class="footer">
    <span class="ver">SoundBridge v1.0</span> · slwen.cn
  </div>

  <div style="display:none" id="log"></div>

  <script>
    var dot=document.getElementById('dot'), stxt=document.getElementById('stxt');
    var micBtn=document.getElementById('micBtn'), micLbl=document.getElementById('micLbl');
    var micWave=document.getElementById('micWave');
    var spkToggle=document.getElementById('spkToggle'), spkVol=document.getElementById('spkVol');
    var errEl=document.getElementById('err'), dbgEl=document.getElementById('dbg');
    var statMic=document.getElementById('statMic'), statSpk=document.getElementById('statSpk');

    // New UI elements
    var micCard=document.getElementById('micCard');
    var spkCard=document.getElementById('spkCard');
    var spkBtn=document.getElementById('spkBtn');
    var spkLbl=document.getElementById('spkLbl');
    var spkWave=document.getElementById('spkWave');

    var ws=null, recording=false, spkOn=false;
    var actx=null, playCtx=null, gainNode=null, nextTime=0, stream=null;
    var micBytes=0, spkBytes=0, pingTimer=null, logEl=document.getElementById('log');

    function dbg(m){dbgEl.textContent=m;}
    function log(m){logEl.textContent=new Date().toLocaleTimeString()+' '+m;}
    function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':b>1024?(b/1024).toFixed(1)+' KB':b+' B';}

    // ===== Detect relay mode =====
    var relayMode=false, sessionId=null;
    (function(){
      var hash=location.hash.replace('#','');
      if(hash && /^[A-Fa-f0-9]{6}$/.test(hash)){
        relayMode=true;
        sessionId=hash.toUpperCase();
      }
    })();

    // ===== Connect =====
    function connect(){
      dot.className='dot'; stxt.textContent='连接中...';

      var url;
      if(relayMode){
        url='wss://'+location.host+'/voice/ws?role=phone&session='+sessionId;
        dbg('Relay mode, session: '+sessionId);
      }else{
        var proto=(location.protocol==='https:')?'wss:':'ws:';
        url=proto+'//'+location.host;
      }

      try{ws=new WebSocket(url);}catch(e){
        stxt.textContent='连接出错';
        setTimeout(connect,3000); return;
      }
      ws.binaryType='arraybuffer';

      var t=setTimeout(function(){
        if(ws&&ws.readyState!==1){ try{ws.close();}catch(e){} }
      },5000);

      ws.onopen=function(){
        clearTimeout(t);
        log('ws open '+(relayMode?'(relay)':'(lan)'));
      };
      ws.onclose=function(){
        clearInterval(pingTimer);
        dot.className='dot'; stxt.textContent='重新连接中...';
        micBtn.disabled=true; spkBtn.disabled=true;
        stopMic(); stopSpeaker();
        setTimeout(connect,2000);
      };
      ws.onerror=function(){
        clearInterval(pingTimer);
        dot.className='dot'; stxt.textContent='连接中...';
        setTimeout(connect,3000);
      };
      ws.onmessage=function(ev){
        if(typeof ev.data==='string'){
          try{
            var m=JSON.parse(ev.data);
            if(m.type==='connected'){
              dbg('Server OK');
              dot.className='dot ok'; stxt.textContent='已连接'+(relayMode?' (中继)':'');
              micBtn.disabled=false; spkBtn.disabled=false;
              clearInterval(pingTimer);
              pingTimer=setInterval(function(){
                if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'ping'}));
              },5000);
            }else if(m.type==='error'){
              stxt.textContent='错误: '+m.message;
              errEl.textContent=m.message;errEl.style.display='block';
            }else if(m.type==='peer-disconnected'){
              dot.className='dot'; stxt.textContent='对方已断开';
              micBtn.disabled=true; spkBtn.disabled=true;
              stopMic(); stopSpeaker();
            }
          }catch(e){}
        }else{
          spkBytes+=ev.data.byteLength;
          statSpk.textContent=fmt(spkBytes);
          if(spkBytes<3000) log('PC audio: '+ev.data.byteLength+' bytes');
          if(spkOn) playChunk(ev.data);
        }
      };
    }

    // ===== Mic (Phone -> PC) =====
    function startMic(){
      if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
        errEl.textContent='麦克风不可用';errEl.style.display='block';return;
      }
      dbg('请求麦克风权限...');
      navigator.mediaDevices.getUserMedia({
        audio:{sampleRate:48000,channelCount:1,echoCancellation:true,noiseSuppression:true}
      }).then(function(s){
        stream=s;
        actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:48000});
        var src=actx.createMediaStreamSource(s);
        var proc=actx.createScriptProcessor(4096,1,1);
        src.connect(proc); proc.connect(actx.destination);
        proc.onaudioprocess=function(e){
          if(!recording||!ws||ws.readyState!==1)return;
          var f32=e.inputBuffer.getChannelData(0);
          var i16=new Int16Array(f32.length);
          for(var i=0;i<f32.length;i++){
            i16[i]=Math.max(-32768,Math.min(32767,f32[i]<0?f32[i]*0x8000:f32[i]*0x7FFF));
          }
          ws.send(i16.buffer);
          micBytes+=i16.buffer.byteLength;
          statMic.textContent=fmt(micBytes);
        };
        recording=true;
        micBtn.className='big-btn mic-btn rec';micBtn.innerHTML='⏹';
        micLbl.textContent='录音中... 点击停止';
        micCard.classList.add('active');
        dot.className='dot rec'; micWave.className='wave on';
        dbg('');
      }).catch(function(err){
        errEl.textContent='麦克风: '+err.message;errEl.style.display='block';
      });
    }

    function stopMic(){
      recording=false;
      if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
      if(actx&&actx.state!=='closed'){actx.close();actx=null;}
      micBtn.className='big-btn mic-btn';micBtn.innerHTML='🎙️';
      micLbl.textContent='点击开始收音';
      micCard.classList.remove('active');
      dot.className=ws&&ws.readyState===1?'dot ok':'dot';
      micWave.className='wave';
    }

    // ===== Speaker (PC -> Phone) =====
    function startSpeaker(){
      spkOn=true;
      // Sync the hidden toggle for compatibility
      spkToggle.className='toggle on blue';
      spkBtn.className='big-btn spk-btn on';
      spkBtn.innerHTML='🔇';
      spkLbl.textContent='播放中... 点击停止';
      spkCard.classList.add('active');
      spkWave.className='wave on';
      if(!playCtx){
        playCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:48000});
        gainNode=playCtx.createGain();
        gainNode.connect(playCtx.destination);
        gainNode.gain.value=spkVol.value/100;
        log('AudioContext created, state='+playCtx.state);
        if(playCtx.state==='suspended') playCtx.resume();
      }
      _chunkCount=0;
      if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'start-pc-audio'}));
      dbg('正在接收 PC 音频...');
      setTimeout(function(){dbgEl.textContent='';},2000);
    }

    function stopSpeaker(){
      spkOn=false;
      spkToggle.className='toggle';
      spkBtn.className='big-btn spk-btn';
      spkBtn.innerHTML='🔊';
      spkLbl.textContent='点击开始播放';
      spkCard.classList.remove('active');
      spkWave.className='wave';
      nextTime=0;
      if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'stop-pc-audio'}));
    }

    var _chunkCount=0;
    function playChunk(buf){
      if(!playCtx)return;
      var i16=new Int16Array(buf);
      _chunkCount++;
      if(_chunkCount<=3) log('chunk#'+_chunkCount+' '+i16.length+' samples, '+buf.byteLength+' bytes');
      var f32=new Float32Array(i16.length);
      for(var i=0;i<i16.length;i++) f32[i]=i16[i]/32768;
      var ab=playCtx.createBuffer(1,f32.length,48000);
      ab.copyToChannel(f32,0);
      var src=playCtx.createBufferSource();
      src.buffer=ab; src.connect(gainNode);
      var now=playCtx.currentTime;
      if(nextTime<now)nextTime=now;
      src.start(nextTime);
      nextTime+=ab.duration;
    }

    // ===== Events =====
    micBtn.onclick=function(){
      dbg('Mic clicked, recording='+recording+', disabled='+micBtn.disabled);
      if(micBtn.disabled)return;
      recording?stopMic():startMic();
    };
    spkBtn.onclick=function(){
      dbg('Spk clicked, spkOn='+spkOn+', disabled='+spkBtn.disabled);
      if(spkBtn.disabled)return;
      spkOn?stopSpeaker():startSpeaker();
    };
    // Keep spkToggle click for compatibility (though hidden)
    spkToggle.onclick=function(){spkOn?stopSpeaker():startSpeaker();};
    spkVol.oninput=function(){if(gainNode)gainNode.gain.value=spkVol.value/100;};

    // ===== Start =====
    if(document.readyState === 'complete') {
      connect();
    } else {
      window.addEventListener('load', connect);
    }
  </script>
</body>
</html>
