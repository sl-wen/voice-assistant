<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Voice Assistant</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      background:#0f0f1a; color:#fff; min-height:100vh;
      display:flex; flex-direction:column; align-items:center; padding:20px;
    }
    .header { text-align:center; margin:30px 0 20px; }
    .header h1 { font-size:24px; font-weight:700; }
    .header p { font-size:13px; color:#888; margin-top:6px; }
    .status-bar {
      display:flex; align-items:center; gap:8px;
      padding:10px 18px; background:rgba(255,255,255,0.05);
      border-radius:12px; margin-bottom:24px; width:100%; max-width:360px;
    }
    .dot {
      width:10px; height:10px; border-radius:50%;
      background:#555; flex-shrink:0; transition:background 0.3s;
    }
    .dot.ok { background:#4ade80; box-shadow:0 0 8px #4ade8066; }
    .dot.rec { background:#f87171; animation:pulse 1s infinite; }
    .dot.blue { background:#60a5fa; animation:pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .stxt { font-size:13px; }

    /* Waveform */
    .wave { display:flex; align-items:center; justify-content:center; gap:3px; height:50px; margin-bottom:20px; }
    .wave .bar { width:4px; height:8px; background:#6366f1; border-radius:2px; }
    .wave.on .bar { animation:w 0.6s ease-in-out infinite; }
    @keyframes w { 0%,100%{height:8px;background:#6366f1} 50%{height:36px;background:#818cf8} }
    .wave.blue .bar { background:#60a5fa; }
    .wave.blue.on .bar { animation:w2 0.6s ease-in-out infinite; }
    @keyframes w2 { 0%,100%{height:8px;background:#60a5fa} 50%{height:36px;background:#93c5fd} }

    /* Buttons */
    .mic-btn {
      width:120px; height:120px; border-radius:50%; border:none;
      background:linear-gradient(135deg,#6366f1,#8b5cf6); color:#fff;
      font-size:42px; cursor:pointer; margin-bottom:6px;
      box-shadow:0 8px 30px rgba(99,102,241,0.3); transition:all 0.3s;
    }
    .mic-btn:active { transform:scale(0.95); }
    .mic-btn.rec { background:linear-gradient(135deg,#ef4444,#dc2626); box-shadow:0 8px 30px rgba(239,68,68,0.4); }
    .mic-btn:disabled { background:#333; box-shadow:none; cursor:not-allowed; }
    .lbl { font-size:13px; color:#888; margin-bottom:24px; }

    /* Sections */
    .section {
      width:100%; max-width:360px;
      background:rgba(255,255,255,0.05); border-radius:16px;
      padding:16px 20px; margin-bottom:12px;
    }
    .section h3 { font-size:13px; color:#888; margin-bottom:10px; }
    .row { display:flex; align-items:center; justify-content:space-between; }
    .row span { font-size:13px; }
    .toggle {
      width:46px; height:26px; background:#333; border-radius:13px;
      position:relative; cursor:pointer; transition:background 0.3s;
    }
    .toggle.on { background:#6366f1; }
    .toggle.on.blue { background:#3b82f6; }
    .toggle::after {
      content:''; width:20px; height:20px; background:#fff;
      border-radius:50%; position:absolute; top:3px; left:3px; transition:left 0.3s;
    }
    .toggle.on::after { left:23px; }
    .vol { display:flex; align-items:center; gap:8px; margin-top:10px; }
    .vol span { font-size:16px; }
    input[type=range] {
      flex:1; -webkit-appearance:none; height:4px;
      background:#333; border-radius:2px; outline:none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:16px; height:16px;
      background:#6366f1; border-radius:50%; cursor:pointer;
    }
    .err { color:#f87171; font-size:12px; text-align:center; margin-top:16px; display:none; }
    .dbg { color:#555; font-size:11px; margin-top:12px; text-align:center; min-height:16px; }
  </style>
</head>
<body>

  <div class="header">
    <h1>Voice Assistant</h1>
    <p>Phone as PC Mic &amp; Speaker</p>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span class="stxt" id="stxt">Connecting...</span>
  </div>

  <!-- Mic waveform -->
  <div class="wave" id="micWave">
    <div class="bar" style="animation-delay:0s"></div>
    <div class="bar" style="animation-delay:.1s"></div>
    <div class="bar" style="animation-delay:.2s"></div>
    <div class="bar" style="animation-delay:.3s"></div>
    <div class="bar" style="animation-delay:.4s"></div>
    <div class="bar" style="animation-delay:.5s"></div>
    <div class="bar" style="animation-delay:.3s"></div>
    <div class="bar" style="animation-delay:.2s"></div>
    <div class="bar" style="animation-delay:.1s"></div>
  </div>

  <!-- Mic button -->
  <button class="mic-btn" id="micBtn" disabled>&#127908;</button>
  <div class="lbl" id="micLbl">Tap to start mic</div>

  <!-- Speaker: receive PC audio -->
  <div class="section">
    <h3>&#128266; Speaker - Hear PC Audio</h3>
    <div class="row">
      <span>Receive PC audio</span>
      <div class="toggle" id="spkToggle"></div>
    </div>
    <div class="vol">
      <span>&#128266;</span>
      <input type="range" id="spkVol" min="0" max="100" value="80">
      <span>&#128266;</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="section">
    <h3>Stats</h3>
    <div class="row"><span>Mic data sent</span><span id="statMic">0 KB</span></div>
    <div class="row" style="margin-top:6px"><span>Speaker data received</span><span id="statSpk">0 KB</span></div>
  </div>

  <div class="err" id="err"></div>
  <div class="dbg" id="dbg"></div>
  <div style="color:#444;font-size:10px;margin-top:8px;text-align:center" id="log"></div>

  <script>
    var dot=document.getElementById('dot'), stxt=document.getElementById('stxt');
    var micBtn=document.getElementById('micBtn'), micLbl=document.getElementById('micLbl');
    var micWave=document.getElementById('micWave');
    var spkToggle=document.getElementById('spkToggle'), spkVol=document.getElementById('spkVol');
    var errEl=document.getElementById('err'), dbgEl=document.getElementById('dbg');
    var statMic=document.getElementById('statMic'), statSpk=document.getElementById('statSpk');

    var ws=null, recording=false, spkOn=false;
    var actx=null, playCtx=null, gainNode=null, nextTime=0, stream=null;
    var micBytes=0, spkBytes=0, pingTimer=null, logEl=document.getElementById('log');

    function dbg(m){dbgEl.textContent=m;}
    function log(m){logEl.textContent=new Date().toLocaleTimeString()+' '+m;}
    function fmt(b){return b>1048576?(b/1048576).toFixed(1)+' MB':b>1024?(b/1024).toFixed(1)+' KB':b+' B';}

    // ===== Detect relay mode =====
    var relayMode=false, sessionId=null;
    (function(){
      var hash=location.hash.replace('#','');
      if(hash && /^[A-Fa-f0-9]{6}$/.test(hash)){
        relayMode=true;
        sessionId=hash.toUpperCase();
      }
    })();

    // ===== Connect =====
    function connect(){
      dot.className='dot'; stxt.textContent='Connecting...';

      var url;
      if(relayMode){
        // Relay: connect to wss://slwen.cn/voice/ws?role=phone&session=XXXXXX
        url='wss://'+location.host+'/voice/ws?role=phone&session='+sessionId;
        dbg('Relay mode, session: '+sessionId);
      }else{
        // LAN: connect directly
        var proto=(location.protocol==='https:')?'wss:':'ws:';
        url=proto+'//'+location.host;
      }

      try{ws=new WebSocket(url);}catch(e){
        stxt.textContent='Error';
        setTimeout(connect,3000); return;
      }
      ws.binaryType='arraybuffer';

      // 5s connect timeout
      var t=setTimeout(function(){
        if(ws&&ws.readyState!==1){ try{ws.close();}catch(e){} }
      },5000);

      ws.onopen=function(){
        clearTimeout(t);
        log('ws open '+(relayMode?'(relay)':'(lan)'));
      };
      ws.onclose=function(){
        clearInterval(pingTimer);
        dot.className='dot'; stxt.textContent='Reconnecting...';
        micBtn.disabled=true; stopMic(); stopSpeaker();
        setTimeout(connect,2000);
      };
      ws.onerror=function(){
        clearInterval(pingTimer);
        dot.className='dot'; stxt.textContent='Connecting...';
        setTimeout(connect,3000);
      };
      ws.onmessage=function(ev){
        if(typeof ev.data==='string'){
          try{
            var m=JSON.parse(ev.data);
            if(m.type==='connected'){
              dbg('Server OK');
              dot.className='dot ok'; stxt.textContent='Connected'+(relayMode?' (Relay)':'');
              micBtn.disabled=false;
              clearInterval(pingTimer);
              pingTimer=setInterval(function(){
                if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'ping'}));
              },5000);
            }else if(m.type==='error'){
              stxt.textContent='Error: '+m.message;
              errEl.textContent=m.message;errEl.style.display='block';
            }else if(m.type==='peer-disconnected'){
              dot.className='dot'; stxt.textContent='PC disconnected';
              micBtn.disabled=true; stopMic(); stopSpeaker();
            }
          }catch(e){}
        }else{
          // Binary = PC audio
          spkBytes+=ev.data.byteLength;
          statSpk.textContent=fmt(spkBytes);
          if(spkOn) playChunk(ev.data);
        }
      };
    }

    // ===== Mic (Phone -> PC) =====
    function startMic(){
      if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
        errEl.textContent='Mic not supported';errEl.style.display='block';return;
      }
      dbg('Requesting mic...');
      navigator.mediaDevices.getUserMedia({
        audio:{sampleRate:48000,channelCount:1,echoCancellation:true,noiseSuppression:true}
      }).then(function(s){
        stream=s;
        actx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:48000});
        var src=actx.createMediaStreamSource(s);
        var proc=actx.createScriptProcessor(4096,1,1);
        src.connect(proc); proc.connect(actx.destination);
        proc.onaudioprocess=function(e){
          if(!recording||!ws||ws.readyState!==1)return;
          var f32=e.inputBuffer.getChannelData(0);
          var i16=new Int16Array(f32.length);
          for(var i=0;i<f32.length;i++){
            i16[i]=Math.max(-32768,Math.min(32767,f32[i]<0?f32[i]*0x8000:f32[i]*0x7FFF));
          }
          ws.send(i16.buffer);
          micBytes+=i16.buffer.byteLength;
          statMic.textContent=fmt(micBytes);
        };
        recording=true;
        micBtn.className='mic-btn rec';micBtn.innerHTML='&#9209;';
        micLbl.textContent='Recording... tap to stop';
        dot.className='dot rec'; micWave.className='wave on';
        dbg('');
      }).catch(function(err){
        errEl.textContent='Mic: '+err.message;errEl.style.display='block';
      });
    }

    function stopMic(){
      recording=false;
      if(stream){stream.getTracks().forEach(function(t){t.stop();});stream=null;}
      if(actx&&actx.state!=='closed'){actx.close();actx=null;}
      micBtn.className='mic-btn';micBtn.innerHTML='&#127908;';
      micLbl.textContent='Tap to start mic';
      dot.className=ws&&ws.readyState===1?'dot ok':'dot';
      micWave.className='wave';
    }

    // ===== Speaker (PC -> Phone) =====
    function startSpeaker(){
      spkOn=true;
      spkToggle.className='toggle on blue';
      if(!playCtx){
        playCtx=new(window.AudioContext||window.webkitAudioContext)({sampleRate:48000});
        gainNode=playCtx.createGain();
        gainNode.connect(playCtx.destination);
        gainNode.gain.value=spkVol.value/100;
      }
      // Tell server to start sending PC audio
      if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'start-pc-audio'}));
      dbg('Receiving PC audio...');
      setTimeout(function(){dbgEl.textContent='';},2000);
    }

    function stopSpeaker(){
      spkOn=false;
      spkToggle.className='toggle';
      nextTime=0;
      if(ws&&ws.readyState===1) ws.send(JSON.stringify({type:'stop-pc-audio'}));
    }

    function playChunk(buf){
      if(!playCtx)return;
      var i16=new Int16Array(buf);
      var f32=new Float32Array(i16.length);
      for(var i=0;i<i16.length;i++) f32[i]=i16[i]/32768;
      var ab=playCtx.createBuffer(1,f32.length,48000);
      ab.copyToChannel(f32,0);
      var src=playCtx.createBufferSource();
      src.buffer=ab; src.connect(gainNode);
      var now=playCtx.currentTime;
      if(nextTime<now)nextTime=now;
      src.start(nextTime);
      nextTime+=ab.duration;
    }

    // ===== Events =====
    micBtn.onclick=function(){recording?stopMic():startMic();};
    spkToggle.onclick=function(){spkOn?stopSpeaker():startSpeaker();};
    spkVol.oninput=function(){if(gainNode)gainNode.gain.value=spkVol.value/100;};

    // ===== Start =====
    // Wait for page fully loaded before connecting
    if(document.readyState === 'complete') {
      connect();
    } else {
      window.addEventListener('load', connect);
    }
  </script>
</body>
</html>
