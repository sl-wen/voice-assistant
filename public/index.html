<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Voice Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .header { text-align: center; margin: 40px 0 30px; }
    .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .header p { font-size: 14px; color: #888; }
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 20px; background: rgba(255,255,255,0.05);
      border-radius: 12px; margin-bottom: 30px; width: 100%; max-width: 360px;
    }
    .status-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #555; transition: background 0.3s; flex-shrink: 0;
    }
    .status-dot.ok { background: #4ade80; box-shadow: 0 0 8px #4ade8066; }
    .status-dot.rec { background: #f87171; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .status-text { font-size: 14px; }
    .waveform {
      display: flex; align-items: center; justify-content: center;
      gap: 3px; height: 60px; margin-bottom: 30px;
    }
    .waveform .bar {
      width: 4px; height: 8px; background: #6366f1;
      border-radius: 2px; transition: height 0.1s;
    }
    .waveform.on .bar { animation: wave 0.6s ease-in-out infinite; }
    @keyframes wave { 0%,100%{height:8px;background:#6366f1} 50%{height:40px;background:#818cf8} }
    .mic-btn {
      width: 140px; height: 140px; border-radius: 50%; border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; font-size: 48px; cursor: pointer;
      transition: all 0.3s; box-shadow: 0 8px 30px rgba(99,102,241,0.3);
      margin-bottom: 20px;
    }
    .mic-btn:active { transform: scale(0.95); }
    .mic-btn.rec {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 8px 30px rgba(239,68,68,0.4);
    }
    .mic-btn:disabled { background: #333; box-shadow: none; cursor: not-allowed; }
    .label { font-size: 14px; color: #888; margin-bottom: 30px; }
    .speaker-box {
      width: 100%; max-width: 360px;
      background: rgba(255,255,255,0.05); border-radius: 16px; padding: 20px;
    }
    .speaker-box h3 { font-size: 14px; color: #888; margin-bottom: 12px; }
    .row { display: flex; align-items: center; justify-content: space-between; }
    .toggle {
      width: 50px; height: 28px; background: #333; border-radius: 14px;
      position: relative; cursor: pointer; transition: background 0.3s;
    }
    .toggle.on { background: #6366f1; }
    .toggle::after {
      content:''; width: 22px; height: 22px; background: white;
      border-radius: 50%; position: absolute; top: 3px; left: 3px; transition: left 0.3s;
    }
    .toggle.on::after { left: 25px; }
    .vol { display:flex; align-items:center; gap:10px; margin-top:12px; }
    .vol span { font-size: 18px; }
    input[type=range] {
      flex:1; -webkit-appearance:none; height:4px;
      background:#333; border-radius:2px; outline:none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none; width:18px; height:18px;
      background:#6366f1; border-radius:50%; cursor:pointer;
    }
    .err { color:#f87171; font-size:13px; text-align:center; margin-top:20px; display:none; }
    .debug { color:#666; font-size:11px; margin-top:20px; text-align:center; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Voice Assistant</h1>
    <p>Phone as PC Mic & Speaker</p>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="dot"></div>
    <span class="status-text" id="statusTxt">Connecting...</span>
  </div>

  <div class="waveform" id="wave">
    <div class="bar" style="animation-delay:0s"></div>
    <div class="bar" style="animation-delay:.1s"></div>
    <div class="bar" style="animation-delay:.2s"></div>
    <div class="bar" style="animation-delay:.3s"></div>
    <div class="bar" style="animation-delay:.4s"></div>
    <div class="bar" style="animation-delay:.5s"></div>
    <div class="bar" style="animation-delay:.3s"></div>
    <div class="bar" style="animation-delay:.2s"></div>
    <div class="bar" style="animation-delay:.1s"></div>
    <div class="bar" style="animation-delay:0s"></div>
  </div>

  <button class="mic-btn" id="micBtn" disabled>&#127908;</button>
  <div class="label" id="micLabel">Tap to start mic</div>

  <div class="speaker-box">
    <h3>Speaker Output</h3>
    <div class="row">
      <span>Receive PC audio</span>
      <div class="toggle" id="spkToggle"></div>
    </div>
    <div class="vol">
      <span>&#128266;</span>
      <input type="range" id="volSlider" min="0" max="100" value="80">
      <span>&#128266;</span>
    </div>
  </div>

  <div class="err" id="err"></div>
  <div class="debug" id="dbg"></div>

  <script>
    var dot = document.getElementById('dot');
    var statusTxt = document.getElementById('statusTxt');
    var micBtn = document.getElementById('micBtn');
    var micLabel = document.getElementById('micLabel');
    var wave = document.getElementById('wave');
    var spkToggle = document.getElementById('spkToggle');
    var volSlider = document.getElementById('volSlider');
    var errEl = document.getElementById('err');
    var dbgEl = document.getElementById('dbg');

    var ws = null;
    var recording = false;
    var spkOn = false;
    var actx = null;
    var playCtx = null;
    var gainNode = null;
    var nextTime = 0;
    var stream = null;

    function dbg(msg) { dbgEl.textContent = msg; dbgEl.style.display = 'block'; }

    // Connect
    function connect() {
      var proto = (location.protocol === 'https:') ? 'wss:' : 'ws:';
      var url = proto + '//' + location.host;
      dbg('Connecting to ' + url + '...');
      try {
        ws = new WebSocket(url);
      } catch(e) {
        errEl.textContent = 'WebSocket error: ' + e.message;
        errEl.style.display = 'block';
        return;
      }
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        dot.className = 'status-dot ok';
        statusTxt.textContent = 'Connected';
        micBtn.disabled = false;
        dbg('Connected!');
        setTimeout(function(){ dbgEl.style.display='none'; }, 2000);
      };

      ws.onclose = function() {
        dot.className = 'status-dot';
        statusTxt.textContent = 'Disconnected';
        micBtn.disabled = true;
        stopMic();
        dbg('Reconnecting in 3s...');
        setTimeout(connect, 3000);
      };

      ws.onerror = function() {
        errEl.textContent = 'Connection failed';
        errEl.style.display = 'block';
      };

      ws.onmessage = function(ev) {
        if (typeof ev.data === 'string') {
          try { var m = JSON.parse(ev.data); if(m.type==='connected') dbg('Server confirmed'); } catch(e){}
        } else if (spkOn) {
          playChunk(ev.data);
        }
      };
    }

    // Mic
    function startMic() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        errEl.textContent = 'Browser does not support mic access. Try Chrome/Safari.';
        errEl.style.display = 'block';
        return;
      }
      dbg('Requesting mic permission...');
      navigator.mediaDevices.getUserMedia({
        audio: { sampleRate:48000, channelCount:1, echoCancellation:true, noiseSuppression:true }
      }).then(function(s) {
        stream = s;
        actx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate:48000 });
        var src = actx.createMediaStreamSource(s);
        var proc = actx.createScriptProcessor(4096, 1, 1);
        src.connect(proc);
        proc.connect(actx.destination);

        proc.onaudioprocess = function(e) {
          if (!recording || !ws || ws.readyState !== 1) return;
          var f32 = e.inputBuffer.getChannelData(0);
          var i16 = new Int16Array(f32.length);
          for (var i = 0; i < f32.length; i++) {
            var v = f32[i] < 0 ? f32[i] * 0x8000 : f32[i] * 0x7FFF;
            i16[i] = Math.max(-32768, Math.min(32767, v));
          }
          ws.send(i16.buffer);
        };

        recording = true;
        micBtn.className = 'mic-btn rec';
        micBtn.innerHTML = '&#9209;';
        micLabel.textContent = 'Recording... tap to stop';
        dot.className = 'status-dot rec';
        wave.className = 'waveform on';
      }).catch(function(err) {
        errEl.textContent = 'Mic error: ' + err.message;
        errEl.style.display = 'block';
      });
    }

    function stopMic() {
      recording = false;
      if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
      if (actx && actx.state !== 'closed') { actx.close(); actx = null; }
      micBtn.className = 'mic-btn';
      micBtn.innerHTML = '&#127908;';
      micLabel.textContent = 'Tap to start mic';
      dot.className = ws && ws.readyState === 1 ? 'status-dot ok' : 'status-dot';
      wave.className = 'waveform';
    }

    // Speaker
    function playChunk(buf) {
      if (!playCtx) {
        playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate:48000 });
        gainNode = playCtx.createGain();
        gainNode.connect(playCtx.destination);
        gainNode.gain.value = volSlider.value / 100;
      }
      var i16 = new Int16Array(buf);
      var f32 = new Float32Array(i16.length);
      for (var i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
      var ab = playCtx.createBuffer(1, f32.length, 48000);
      ab.copyToChannel(f32, 0);
      var src = playCtx.createBufferSource();
      src.buffer = ab;
      src.connect(gainNode);
      var now = playCtx.currentTime;
      if (nextTime < now) nextTime = now;
      src.start(nextTime);
      nextTime += ab.duration;
    }

    // Events
    micBtn.onclick = function() { recording ? stopMic() : startMic(); };
    spkToggle.onclick = function() { spkOn = !spkOn; spkToggle.className = spkOn ? 'toggle on' : 'toggle'; };
    volSlider.oninput = function() { if (gainNode) gainNode.gain.value = volSlider.value / 100; };

    // Start
    connect();
  </script>
</body>
</html>
